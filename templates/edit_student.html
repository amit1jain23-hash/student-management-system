<!DOCTYPE html>
<html>

<head>
    <title>Edit Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="form-card">

        <a href="/" class="home-btn">🏠 Home</a>

        <h1>Edit Student</h1>

        <form method="POST">

            <input type="hidden" name="student_id" value="{{ student[0] }}">

            <label>Name</label>
            <input type="text" name="name" value="{{ student[1] }}">

            <label>Age</label>
            <input type="number" name="age" value="{{ student[2] }}">

            <label>Gender</label>
            <select name="gender">
                <option value="Male"
                {% if student[3] == 'Male' %}selected{% endif %}>
                Male
                </option>

                <option value="Female"
                {% if student[3] == 'Female' %}selected{% endif %}>
                Female
                </option>

                <option value="Other"
                {% if student[3] == 'Other' %}selected{% endif %}>
                Other
                </option>
            </select>

            <label>Email</label>
            <input type="email" name="email" value="{{ student[4] }}">

            <label>Phone</label>
            <input type="text" name="phone" value="{{ student[5] }}">

            <label>Course</label>
            <input type="text" name="course" value="{{ student[6] }}">

            <input type="submit" value="Update Student">

        </form>

    </div>

</body>

</html>
